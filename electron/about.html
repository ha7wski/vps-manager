<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline';" />
    <title>About VPS Manager</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0f172a;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 24px;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        background: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
      }
      .dot { width: 14px; height: 14px; border-radius: 50%; background: #10b981; }
      h1 { font-size: 18px; margin: 0 0 4px; }
      .ver { font-size: 13px; color: #94a3b8; }
      .desc { font-size: 12px; color: #64748b; margin-top: 12px; max-width: 280px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo"><div class="dot"></div></div>
      <h1>VPS Manager</h1>
      <div class="ver">Version <span id="version">…</span></div>
      <div class="desc">Remote Ubuntu VPS management over SSH/SFTP.</div>
    </div>
    <script>
      // Version is injected by the main process via the query string.
      const params = new URLSearchParams(location.search);
      document.getElementById("version").textContent = params.get("v") || "unknown";
    </script>
  </body>
</html>
